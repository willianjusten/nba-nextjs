name: PR CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint (OXC)
        run: npx oxlint .

      - name: Run type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
